<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>~/publications — Stephen J. Hilt</title>
  <meta name="description" content="Papers, reports, and talks by Stephen J. Hilt." />
  <link rel="stylesheet" href="assets/css/site.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#111317" />
  <style>
    /* tiny helper styles for the filter bar (keeps your main CSS untouched) */
    .filters {
      display: flex; flex-wrap: wrap; gap: .5rem 1rem; align-items: center;
      margin: .75rem 0 1rem 0;
    }
    .filters__label { font-weight: 600; opacity: .9; margin-right: .5rem; }
    .filters__group { display: inline-flex; flex-wrap: wrap; gap: .75rem 1rem; }
    .filters__chip {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .25rem .5rem; border: 1px solid rgba(255,255,255,.12);
      border-radius: .5rem; background: rgba(255,255,255,.03);
      font-size: .9rem; cursor: pointer; user-select: none;
    }
    .filters__count { opacity: .65; font-variant-numeric: tabular-nums; }
    .filters__actions { margin-left: auto; display: inline-flex; gap: .5rem; }
    .btn-link { background: none; border: none; color: inherit; text-decoration: underline; cursor: pointer; padding: .2rem .3rem; }
    @media (max-width: 640px){ .filters { gap: .5rem; } .filters__actions { width: 100%; margin-left: 0; } }
  </style>
</head>
<body>
  <header class="site-header container">
    <a class="brand" href="index.html">Stephen J. Hilt</a>
    <nav class="nav">
      <a href="index.html#about">about</a>
      <a href="index.html#featured">featured</a>
      <a class="active" href="publications.html">publications</a>
      <a href="resume.html" aria-current="page">résumé</a>
      <a href="https://github.com/sjhilt" target="_blank" rel="noopener">github</a>
    </nav>
  </header>

  <header class="hero-banner" aria-label="publications header image">
    <img class="hero-banner__img" alt="" decoding="async" />
    <div class="hero-banner__overlay"></div>
    <div class="container hero-banner__content">
      <h1>~/publications</h1>
      <p class="lede">Selected papers, reports, and talks.</p>
    </div>
  </header>

  <main class="container section">
    <!-- Scholar card -->
    <section class="pub-section">
      <h2>google scholar</h2>
      <div class="terminal-like">
        <iframe src="scholar-box.html" width="100%" height="400" class="scholar-frame" frameborder="0"></iframe>
      </div>
    </section>

    <!-- Publications table -->
    <section class="pub-section">
      <h2>list</h2>

      <!-- Display filters -->
      <div class="terminal-like">
        <div class="filters" role="group" aria-label="Filter by type">
          <span class="filters__label">Filter by type:</span>
          <div id="filters-group" class="filters__group">
            <!-- checkboxes injected by JS -->
          </div>
          <div class="filters__actions">
            <button type="button" class="btn-link" id="filters-select-all">select all</button>
            <button type="button" class="btn-link" id="filters-clear">clear</button>
          </div>
        </div>

        <table class="pub-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Type</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody id="pub-table-body">
            <tr><td colspan="4" class="muted">Loading publications…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer container">
    <small>© <span id="year"></span> Stephen J. Hilt</small>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="assets/js/photos.js" defer></script>

  <script>
  (function(){
    const tbody = document.getElementById('pub-table-body');

    // Only these 5 types are allowed
    const TYPES = ['Blog','Paper','Presentation','Book','Code'];

    // State
    let allData = [];
    let activeTypes = new Set(TYPES);

    // ------ Rendering ------
    function renderRows(items){
      if (!Array.isArray(items) || !items.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="muted">No publications found.</td></tr>';
        return;
      }
      items.sort((a,b) => (b.date||'').localeCompare(a.date||''));
      tbody.innerHTML = items.map(pub => `
        <tr>
          <td>${pub.date ?? ''}</td>
          <td>${pub.title ? (pub.link ? `<a href="${pub.link}" target="_blank" rel="noopener">${escapeHTML(pub.title)}</a>` : escapeHTML(pub.title)) : ''}</td>
          <td>${pub.type ?? ''}</td>
          <td>${pub.link ? `<a href="${pub.link}" target="_blank" rel="noopener">${escapeHTML(pub.display || 'Link')}</a>` : ''}</td>
        </tr>
      `).join('');
    }

    function applyFilter(){
      const filtered = allData.filter(p => activeTypes.has(p.type));
      renderRows(filtered);
      updateCounts();
      updateQueryString();
    }

    // ------ Filters UI ------
    const filtersGroup = document.getElementById('filters-group');

    function buildFilters(){
      filtersGroup.innerHTML = TYPES.map(t => {
        const id = `f-${t.toLowerCase()}`;
        return `
          <label class="filters__chip" for="${id}">
            <input type="checkbox" id="${id}" value="${t}" checked />
            <span>${t}</span>
            <span class="filters__count" data-count-for="${t}">(0)</span>
          </label>
        `;
      }).join('');
      filtersGroup.addEventListener('change', onFilterChange);
      document.getElementById('filters-select-all').addEventListener('click', selectAll);
      document.getElementById('filters-clear').addEventListener('click', clearAll);
    }

    function onFilterChange(e){
      if (e.target && e.target.type === 'checkbox') {
        const type = e.target.value;
        if (e.target.checked) activeTypes.add(type);
        else activeTypes.delete(type);
        // If nothing selected, keep table empty (explicit signal)
        applyFilter();
      }
    }

    function selectAll(){
      activeTypes = new Set(TYPES);
      setCheckboxesFromState();
      applyFilter();
    }

    function clearAll(){
      activeTypes.clear();
      setCheckboxesFromState();
      applyFilter();
    }

    function setCheckboxesFromState(){
      TYPES.forEach(t => {
        const cb = document.querySelector(`input[value="${t}"]`);
        if (cb) cb.checked = activeTypes.has(t);
      });
    }

    function updateCounts(){
      const counts = TYPES.reduce((acc,t)=> (acc[t]=0, acc), {});
      allData.forEach(p => { if (counts[p.type] !== undefined) counts[p.type]++; });
      TYPES.forEach(t => {
        const el = document.querySelector(`[data-count-for="${t}"]`);
        if (el) el.textContent = `(${counts[t]})`;
      });
    }

    // ------ URL sync ------
    function updateQueryString(){
      const params = new URLSearchParams(location.search);
      const list = Array.from(activeTypes);
      if (list.length === TYPES.length) {
        params.delete('types');
      } else {
        params.set('types', list.join(','));
      }
      const newUrl = `${location.pathname}?${params.toString()}${location.hash}`;
      history.replaceState(null, '', newUrl);
    }

    function hydrateFromQueryString(){
      const params = new URLSearchParams(location.search);
      const q = params.get('types');
      if (!q) return; // default: all selected
      const wanted = new Set(q.split(',').map(s => s.trim()).filter(Boolean));
      // keep only valid TYPES
      activeTypes = new Set(TYPES.filter(t => wanted.has(t)));
    }

    // ------ Data loading ------
    async function load() {
      const candidates = ['publications.json', 'data/publications.json'];
      let data=null, lastErr=null;
      for (const path of candidates) {
        try {
          const res = await fetch(path, { cache:'no-cache' });
          if (!res.ok) { lastErr = res.status + ' ' + res.statusText; continue; }
          const json = await res.json();
          data = Array.isArray(json) ? json : (json && json.publications);
          if (Array.isArray(data)) break;
          lastErr = 'unexpected JSON shape';
        } catch (e) { lastErr = e.message; }
      }
      if (!data) {
        tbody.innerHTML = `<tr><td colspan="4" class="error">Failed to load publications (${lastErr || 'no data'}).</td></tr>`;
        return;
      }

      // Normalize unknown/mixed types to our 5 buckets if needed
      allData = data.map(p => ({ ...p, type: normalizeType(p.type) })).filter(p => !!p.type && TYPES.includes(p.type));

      hydrateFromQueryString();
      setCheckboxesFromState();
      updateCounts();
      applyFilter();
    }

    // Utilities
    function normalizeType(t){
      if (!t) return null;
      const s = String(t).toLowerCase();
      if (s.includes('blog')) return 'Blog';
      if (s.includes('paper') || s.includes('report') || s.includes('white')) return 'Paper';
      if (s.includes('present')) return 'Presentation';
      if (s.includes('book')) return 'Book';
      if (s.includes('code')) return 'Code';
      return null; // drop anything else
    }

    function escapeHTML(str){
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    // init
    buildFilters();
    document.addEventListener('DOMContentLoaded', load);
  })();
  </script>
</body>
</html>
